checkpoint_strategy: "steps"
checkpoint_interval: 50
log_level: "INFO"
detailed_progress_info: true

constants:
  gen_template: |-
    You are a domain-aware assistant trained on Earth Observation data.
    Given the following document from an Earth Observation research paper or article, your task is to:
    
    1. Generate a natural-sounding, open-ended question that is relevant to the domain but cannot be answered using only the information in the passage.
    2. Provide a refusal-style answer that clearly communicates that the passage does not contain enough information to answer the question.
    
    IMPORTANT: Your answer must be a refusal. Do not attempt to answer the question using the provided context or any external knowledge. The goal is to demonstrate appropriate refusal when information is insufficient.
    The refusal answer should be polite, helpful, and honest. Examples:
    
    "I'm sorry, but the provided context does not contain enough information to answer that question."
    "Based on the information in this document, I cannot provide a complete answer to that question."
    "The passage doesn't include the specific details needed to address this question."
    
    <document>
    {content}
    </document>


steps:
  - method: JSONLReader
    description: "read docs"
    run_params:
      show_progress: true
    params:
      path: $DATA_PATH
    output: sample


  - method: LLM
    description: "Generate Q&A"
    run_params:
      show_progress: true
      input_batch_size: 1
    params:
      chosen_model_field: "chosen_model"
      models:
        $MODEL:
          model: $MODEL
          temperature: 0.3
          max_tokens: 30000
          base_url: "http://localhost:8000/v1/"
          api_key: 'EMPTY'
          response_model:
            pairs:
            - question: str
              answer: str
          template: !ref gen_template
    input: sample
    output: llm_output


  - method: Combine
    description: "Combine LLM out and input"
    input:
      - sample
      - llm_output
    output: llm_out_sample



  - method: Unpack
    description: "Unpack each qa pair into a separate object"
    run_params:
      show_progress: true
      input_batch_size: 1
    params:
      key: pairs
    input: llm_out_sample
    output: unpacked_llm_out


  - method: ExpressionTransform
    params:
      remove:
        - 'content'
    input: unpacked_llm_out
    output: llm_out_transformed



  - method: JSONLWriter
    description: "write output"
    run_params:
      show_progress: true
    params:
      path: "data/out_data.jsonl"
    input: llm_out_transformed