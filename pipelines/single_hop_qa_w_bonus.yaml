checkpoint_strategy: "steps"
checkpoint_interval: 500
log_level: "INFO"
detailed_progress_info: true
steps:
  - method: JSONLReader
    description: "read docs"
    run_params:
      show_progress: true
    params:
      path: "dataset"
    output: sample


  - method: RandomChoice
    params:
      choices:
        - "Questions should probe different aspects of the content, encouraging a variety of answers."
        - "Formulate questions that challenge or dissect key points, theories, or data."
        - "Focus on comparing and contrasting ideas or findings with other known theories or data in Earth Observation."
        - "Create questions based on hypothetical scenarios or 'what-if' questions inspired by the document."
        - "Form questions and answers focusing on the practical applications and implications of the research findings."
        - "Formulate questions about potential future research directions or unanswered questions that arise from the study's findings."
        - "Delve into the technical aspects or methodologies used in the study. Ask questions that require detailed explanations of the processes, techniques, or calculations presented."
        - "Create questions that explore connections between the study's findings and other scientific disciplines, such as physics, mathematics, or computer science."
        - "Ask questions that consider the broader philosophical implications or ethical considerations of the research findings in the field of Earth Observation."
        - "Don't forget to have fun!"
        - "Remember to be creative!"
        - "Feel free to reply with a sense of humor."
        - "Be sure to include all relevant details in your answers."
        - "Make sure that each answer is clear and specific."
        - "Ensure that each answer is comprehensive and complete."
        - "Ensure that each question and answer pair is contextually clear."
        - "Ensure that each question and answer pair is complete."
    output:
      bonus_instruction:
        bonus_instruction: choice
    input: sample

  - method: Combine
    description: "Combine LLM out and input"
    input:
      - sample
      - bonus_instruction
    output: sample_bonus


  - method: LLM
    description: "Generate Q&A"
    run_params:
      show_progress: true
      input_batch_size: 1
    params:
      temperature: 0.3
      max_tokens: 10000
      response_model:
        pairs:
          - question: str
            answer: str
      model: "mistral_small"
      template: |
        You are an expert in Earth Observation. Your task is to carefully read the document provided and generate a set of clear, informative question-answer pairs based on its content.
        
        Each question should test understanding of a specific concept, fact, or process mentioned in the text. The answers must be accurate and concise, directly supported by the document.
        
        Focus on creating questions that cover a range of topics within the document and vary in type (e.g., factual, explanatory, comparative). Avoid trivial or overly vague questions.
        
        {bonus_instruction}
        
        Document starts here:

        {content}
    input: sample_bonus
    output: llm_output



  - method: Combine
    description: "Combine LLM out and input"
    input:
      - llm_output
      - sample
    output: llm_out_sample


  - method: Unpack
    description: "Unpack each qa pair into a separate object"
    run_params:
      show_progress: true
    params:
      key: pairs
      replay_fields:
        - path
    input: llm_out_sample
    output: unpacked

  - method: JSONLWriter
    description: "write output"
    run_params:
      show_progress: true
    params:
      path: "data/output_qa.jsonl"
    input: unpacked